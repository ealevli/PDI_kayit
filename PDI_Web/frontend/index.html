<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/mercedes-logo.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="PDI Digital" />
    <link rel="manifest" href="/manifest.json" />
    <title>PDI Digital — Mercedes-Benz Türk</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Daimler CS', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif;
        background: #f2f2f2;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[PWA] SW registered', reg.scope))
            .catch(err => console.warn('[PWA] SW registration failed', err));
        });
      }
    </script>
  </body>
</html>
